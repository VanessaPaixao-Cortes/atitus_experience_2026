<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Protocolo Phoenix</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="app">

        <section class="header">
            <div>
                <h1>Validação do núcleo central</h1>
                <p class="subtitle">Insira os códigos para reativar Cidade 0</p>
            </div>

            <img src="Logo - Atitus (Branca).png" class="logo">
        </section>

        <section class="content">

            <div class="panel">
                <h2>Inserção dos códigos</h2>

                <div class="grid">
                    <input id="codigo1" placeholder="Código 1">
                    <input id="codigo2" placeholder="Código 2">
                    <input id="codigo3" placeholder="Código 3">
                    <input id="codigo4" placeholder="Código 4">
                </div>

                <div class="actions">
                    <button onclick="validarCodigos()">VALIDAR</button>
                    <button onclick="limparCampos()">LIMPAR</button>
                </div>
            </div>

            <div class="panel">
                <div id="statusMessage">Aguardando códigos...</div>

                <div id="videoWrapper" class="video-wrapper">
                    <video id="videoFinal" controls>
                        <source src="video-final.mp4">
                    </video>
                </div>
            </div>

        </section>

        <div id="overlay" class="overlay">
            <h1>ACESSO LIBERADO</h1>
        </div>

    </main>

    <audio id="somValidacao" src="som-validacao.mp3"></audio>
    <audio id="somAcesso" src="som-acesso-concedido.mp3"></audio>

    <script src="script.js"></script>
</body>

</html>
